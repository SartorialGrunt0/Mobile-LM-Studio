services:
  mobile-lm-studio:
    build: .
    ports:
      - "5090:5080"
    volumes:
      - mobile-lm-studio-data:/data
      - ./src/node:/app/src/node:ro
      - ./src/MobileLmStudio/wwwroot:/app/src/MobileLmStudio/wwwroot:ro
      - ./src/MobileLmStudio/appsettings.json:/app/appsettings.json:ro
    environment:
      # Required: URL of your LM Studio server.
      # On Docker Desktop (Windows/Mac) use host.docker.internal to reach the host machine.
      LMSTUDIO_URL: http://192.168.1.145:1234
      # Optional: LM Studio API token (leave blank if not configured)
      # LMSTUDIO_API_TOKEN: your-token-here
      # Optional: path to LM Studio mcp.json inside the container
      # LMSTUDIO_MCP_CONFIG_PATH: /data/mcp.json
    restart: unless-stopped

volumes:
  mobile-lm-studio-data:
